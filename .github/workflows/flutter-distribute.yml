name: Flutter - Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build and distribute'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - both
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: ''
        type: string

  push:
    branches: [master]
    paths:
      - 'mobile_flutter/**'
      - '.github/workflows/flutter-distribute.yml'

env:
  FLUTTER_VERSION: '3.44.0'
  JAVA_VERSION: '17'

jobs:
  build-distribute-android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    defaults:
      run:
        working-directory: mobile_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Generate release notes
        id: notes
        run: |
          if [ -n "${{ inputs.release_notes }}" ]; then
            echo "notes=${{ inputs.release_notes }}" >> $GITHUB_OUTPUT
          else
            NOTES=$(git log --oneline -5 --pretty=format:"• %s" -- mobile_flutter/)
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal
          file: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ steps.notes.outputs.notes }}

  build-distribute-ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    defaults:
      run:
        working-directory: mobile_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Apple certificate & provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - run: flutter pub get

      - name: Build iOS IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: mobile_flutter/build/ios/ipa/*.ipa

      - name: Generate release notes
        id: notes
        run: |
          if [ -n "${{ inputs.release_notes }}" ]; then
            echo "notes=${{ inputs.release_notes }}" >> $GITHUB_OUTPUT
          else
            NOTES=$(git log --oneline -5 --pretty=format:"• %s" -- mobile_flutter/)
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal
          file: mobile_flutter/build/ios/ipa/luvverse.ipa
          releaseNotes: ${{ steps.notes.outputs.notes }}
