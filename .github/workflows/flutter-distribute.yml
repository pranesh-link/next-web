name: Flutter - Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build and distribute'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - both
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: ''
        type: string

  push:
    branches: [master]
    paths:
      - 'mobile_flutter/**'
      - '.github/workflows/flutter-distribute.yml'

env:
  FLUTTER_VERSION: '3.44.0'
  JAVA_VERSION: '17'

jobs:
  # Shared prep: compute version name + build number, generate release notes
  prepare:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.meta.outputs.version_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
      release_notes: ${{ steps.notes.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version metadata
        id: meta
        working-directory: mobile_flutter
        run: |
          # Version name comes from pubspec.yaml (e.g. 1.1.0)
          VERSION_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          # Build number = CI run number (auto-increments every workflow run)
          BUILD_NUMBER=${{ github.run_number }}
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "### 📦 Build Metadata" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION_NAME ($BUILD_NUMBER)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Generate release notes
        id: notes
        working-directory: mobile_flutter
        run: |
          if [ -n "${{ inputs.release_notes }}" ]; then
            NOTES="${{ inputs.release_notes }}"
          else
            NOTES=$(git log --oneline -10 --pretty=format:"• %s" -- mobile_flutter/ | head -10)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Release Notes" >> $GITHUB_STEP_SUMMARY
          echo "$NOTES" >> $GITHUB_STEP_SUMMARY

  build-distribute-android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    needs: prepare
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    defaults:
      run:
        working-directory: mobile_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${{ needs.prepare.outputs.version_name }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}" \
            --dart-define=API_TARGET=fly

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Distribute to Firebase
        id: distribute
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: luvverse-testers
          file: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ needs.prepare.outputs.release_notes }}

      - name: Build summary — Android
        if: always()
        run: |
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk 2>/dev/null | awk '{print $1}' || echo 'n/a')
          STATUS="${{ job.status }}"
          ICON="✅"
          [[ "$STATUS" != "success" ]] && ICON="❌"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### $ICON Android Distribution" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.prepare.outputs.version_name }}+${{ needs.prepare.outputs.build_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Group | luvverse-testers |" >> $GITHUB_STEP_SUMMARY

  build-distribute-ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    needs: prepare
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    defaults:
      run:
        working-directory: mobile_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Apple certificate & provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - run: flutter pub get

      - name: Build iOS IPA
        run: |
          flutter build ipa --release \
            --build-name="${{ needs.prepare.outputs.version_name }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}" \
            --dart-define=API_TARGET=fly \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: mobile_flutter/build/ios/ipa/*.ipa

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal
          file: mobile_flutter/build/ios/ipa/luvverse.ipa
          releaseNotes: ${{ needs.prepare.outputs.release_notes }}

      - name: Build summary — iOS
        if: always()
        run: |
          IPA_SIZE=$(du -h build/ios/ipa/luvverse.ipa 2>/dev/null | awk '{print $1}' || echo 'n/a')
          STATUS="${{ job.status }}"
          ICON="✅"
          [[ "$STATUS" != "success" ]] && ICON="❌"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### $ICON iOS Distribution" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.prepare.outputs.version_name }}+${{ needs.prepare.outputs.build_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IPA size | $IPA_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Group | internal |" >> $GITHUB_STEP_SUMMARY
