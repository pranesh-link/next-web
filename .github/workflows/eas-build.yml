name: EAS Build (Beta)

on:
  workflow_dispatch:
  # TODO: Enable push trigger once mobile auth flow is stable
  # push:
  #   branches:
  #     - master
  #   paths:
  #     - 'mobile/**'
  #     - 'packages/**'
  #     - '.github/workflows/eas-build.yml'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          echo "registry=https://registry.npmjs.org/" > ../.npmrc
          rm -f package-lock.json
          npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # TODO: Enable iOS build once Apple Developer account is configured
      # - name: Build iOS
      #   run: eas build --profile beta --platform ios --non-interactive

      - name: Build Android
        run: |
          START_TIME=$(date +%s)
          eas build --profile beta --platform android --non-interactive --json | tee build-result.json
          END_TIME=$(date +%s)
          echo "BUILD_DURATION=$(( END_TIME - START_TIME ))" >> $GITHUB_ENV

      - name: Build Summary
        if: always()
        run: |
          if [ -f build-result.json ]; then
            BUILD_ID=$(jq -r '.[0].id' build-result.json)
            STATUS=$(jq -r '.[0].status' build-result.json)
            PLATFORM=$(jq -r '.[0].platform' build-result.json)
            APP_VERSION=$(jq -r '.[0].appVersion // "N/A"' build-result.json)
            BUILD_URL="https://expo.dev/accounts/pranaish/projects/luvverse/builds/${BUILD_ID}"
            DURATION_MIN=$(( ${BUILD_DURATION:-0} / 60 ))
            DURATION_SEC=$(( ${BUILD_DURATION:-0} % 60 ))
            
            echo "## 📱 EAS Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Platform** | ${PLATFORM} |" >> $GITHUB_STEP_SUMMARY
            echo "| **App Version** | ${APP_VERSION} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Build Time** | ${DURATION_MIN}m ${DURATION_SEC}s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Build ID** | \`${BUILD_ID}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Build URL** | [View on Expo](${BUILD_URL}) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ EAS Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Build failed — no result JSON produced." >> $GITHUB_STEP_SUMMARY
          fi
