name: EAS Build (Beta)

on:
  push:
    branches:
      - feat/monorepo-setup
    paths:
      - 'mobile/**'
      - 'packages/**'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # TODO: Enable iOS build once Apple Developer account is configured
      # - name: Build iOS
      #   run: eas build --profile beta --platform ios --non-interactive

      - name: Build Android
        run: eas build --profile beta --platform android --non-interactive
