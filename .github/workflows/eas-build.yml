name: EAS Build (Beta)

on:
  workflow_dispatch:
  # TODO: Enable push trigger once mobile auth flow is stable
  # push:
  #   branches:
  #     - master
  #   paths:
  #     - 'mobile/**'
  #     - 'packages/**'
  #     - '.github/workflows/eas-build.yml'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          echo "registry=https://registry.npmjs.org/" > ../.npmrc
          rm -f package-lock.json
          npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # TODO: Enable iOS build once Apple Developer account is configured
      # - name: Build iOS
      #   run: eas build --profile beta --platform ios --non-interactive

      - name: Build Android
        run: eas build --profile beta --platform android --non-interactive
