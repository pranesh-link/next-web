name: Test Coverage

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags (e.g., v2.33.0)
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests with coverage
        run: npm test -- --coverage --testPathPattern=profile-2.0 --coverageReporters=json-summary --coverageReporters=text --coverageReporters=lcov
        
      - name: Extract coverage metrics
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            STATEMENTS=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)
            LINES=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          else
            echo "Coverage summary not found"
            exit 1
          fi
          
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          
          # Determine badge colors based on coverage thresholds
          statements_color="red"
          [ $(echo "$STATEMENTS >= 90" | bc) -eq 1 ] && statements_color="brightgreen"
          [ $(echo "$STATEMENTS >= 80" | bc) -eq 1 ] && [ $(echo "$STATEMENTS < 90" | bc) -eq 1 ] && statements_color="green"
          [ $(echo "$STATEMENTS >= 70" | bc) -eq 1 ] && [ $(echo "$STATEMENTS < 80" | bc) -eq 1 ] && statements_color="yellow"
          echo "statements_color=$statements_color" >> $GITHUB_OUTPUT
          
          branches_color="red"
          [ $(echo "$BRANCHES >= 90" | bc) -eq 1 ] && branches_color="brightgreen"
          [ $(echo "$BRANCHES >= 80" | bc) -eq 1 ] && [ $(echo "$BRANCHES < 90" | bc) -eq 1 ] && branches_color="green"
          [ $(echo "$BRANCHES >= 70" | bc) -eq 1 ] && [ $(echo "$BRANCHES < 80" | bc) -eq 1 ] && branches_color="yellow"
          echo "branches_color=$branches_color" >> $GITHUB_OUTPUT
          
          functions_color="red"
          [ $(echo "$FUNCTIONS >= 90" | bc) -eq 1 ] && functions_color="brightgreen"
          [ $(echo "$FUNCTIONS >= 80" | bc) -eq 1 ] && [ $(echo "$FUNCTIONS < 90" | bc) -eq 1 ] && functions_color="green"
          [ $(echo "$FUNCTIONS >= 70" | bc) -eq 1 ] && [ $(echo "$FUNCTIONS < 80" | bc) -eq 1 ] && functions_color="yellow"
          echo "functions_color=$functions_color" >> $GITHUB_OUTPUT
          
          lines_color="red"
          [ $(echo "$LINES >= 90" | bc) -eq 1 ] && lines_color="brightgreen"
          [ $(echo "$LINES >= 80" | bc) -eq 1 ] && [ $(echo "$LINES < 90" | bc) -eq 1 ] && lines_color="green"
          [ $(echo "$LINES >= 70" | bc) -eq 1 ] && [ $(echo "$LINES < 80" | bc) -eq 1 ] && lines_color="yellow"
          echo "lines_color=$lines_color" >> $GITHUB_OUTPUT
          
          echo "✅ Coverage extracted: Statements: $STATEMENTS%, Branches: $BRANCHES%, Functions: $FUNCTIONS%, Lines: $LINES%"
          
      - name: Update README with coverage
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Create coverage badge URLs
          STATEMENTS_BADGE="![Coverage: Statements](https://img.shields.io/badge/Statements-${{ steps.coverage.outputs.statements }}%25-${{ steps.coverage.outputs.statements_color }})"
          BRANCHES_BADGE="![Coverage: Branches](https://img.shields.io/badge/Branches-${{ steps.coverage.outputs.branches }}%25-${{ steps.coverage.outputs.branches_color }})"
          FUNCTIONS_BADGE="![Coverage: Functions](https://img.shields.io/badge/Functions-${{ steps.coverage.outputs.functions }}%25-${{ steps.coverage.outputs.functions_color }})"
          LINES_BADGE="![Coverage: Lines](https://img.shields.io/badge/Lines-${{ steps.coverage.outputs.lines }}%25-${{ steps.coverage.outputs.lines_color }})"
          
          # Update README
          sed -i "s|<!-- COVERAGE-BADGES:START -->.*<!-- COVERAGE-BADGES:END -->|<!-- COVERAGE-BADGES:START -->\n$STATEMENTS_BADGE $BRANCHES_BADGE $FUNCTIONS_BADGE $LINES_BADGE\n<!-- COVERAGE-BADGES:END -->|g" README.md
          
      - name: Commit updated README
        if: startsWith(github.ref, 'refs/tags/')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update test coverage badges [skip ci]"
          file_pattern: README.md
          branch: master
          push_options: '--force'
          
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = {
              statements: '${{ steps.coverage.outputs.statements }}',
              branches: '${{ steps.coverage.outputs.branches }}',
              functions: '${{ steps.coverage.outputs.functions }}',
              lines: '${{ steps.coverage.outputs.lines }}'
            };
            
            const comment = `## 📊 Test Coverage Report
            
            | Metric | Coverage |
            |--------|----------|
            | **Statements** | ${coverage.statements}% |
            | **Branches** | ${coverage.branches}% |
            | **Functions** | ${coverage.functions}% |
            | **Lines** | ${coverage.lines}% |
            
            *Coverage report for profile-2.0 components*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
