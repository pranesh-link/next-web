name: PR

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - 'mobile_flutter/**'
      - '.github/workflows/flutter-*'
      - '*.md'

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile --ignore-engines
      - uses: actions/cache@v4
        id: prisma
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}
      - name: Generate Prisma client
        if: steps.prisma.outputs.cache-hit != 'true'
        run: npx prisma generate
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-
      - name: Build
        run: CI="" npx next build --no-lint

  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile --ignore-engines
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=text
      - name: Comment coverage on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 📊 Test Coverage\n\nCoverage report not available.';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const t = summary.total;
              comment = `## 📊 Test Coverage\n\n| Metric | Coverage |\n|--------|----------|\n| Statements | ${t.statements.pct}% |\n| Branches | ${t.branches.pct}% |\n| Functions | ${t.functions.pct}% |\n| Lines | ${t.lines.pct}% |`;
            } catch {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
