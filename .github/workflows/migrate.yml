name: Migrate DB

on:
  push:
    branches: [master]
    paths:
      - 'scripts/migrations/**'

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: migrate-db
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get remove -y postgresql-client-* 2>/dev/null || true
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Run SQL migrations (scripts/migrations/)
        if: ${{ env.DIRECT_DATABASE_URL != '' }}
        run: |
          # Strip sslmode (psql doesn't support no-verify) and force IPv4
          # by resolving the hostname to its IPv4 address before connecting.
          RAW_URL="${DIRECT_DATABASE_URL//sslmode=no-verify/}"
          RAW_URL="${RAW_URL//sslmode=verify-full/}"
          RAW_URL="${RAW_URL//&&/}"

          HOSTNAME=$(python3 -c "
          import re, sys
          m = re.search(r'@([^:/]+)', '$RAW_URL')
          print(m.group(1) if m else '')
          ")
          IPV4=$(python3 -c "
          import socket
          try:
            info = socket.getaddrinfo('$HOSTNAME', 5432, socket.AF_INET)
            print(info[0][4][0])
          except:
            print('$HOSTNAME')
          ")
          PSQL_URL="${RAW_URL//$HOSTNAME/$IPV4}"

          for f in scripts/migrations/*.sql; do
            echo "Running $f..."
            PGSSLMODE=require psql "$PSQL_URL" -f "$f"
            echo "Done: $f"
          done
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

