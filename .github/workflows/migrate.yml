name: Migrate DB

on:
  push:
    branches: [master]
    paths:
      - 'scripts/migrations/**'

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: migrate-db
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get remove -y postgresql-client-* 2>/dev/null || true
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Run SQL migrations (scripts/migrations/)
        if: ${{ env.DIRECT_DATABASE_URL != '' }}
        run: |
          # Strip unsupported sslmode values
          RAW_URL=$(echo "$DIRECT_DATABASE_URL" | sed 's/sslmode=[^&?]*//g' | sed 's/[?&]$//g')

          # Resolve hostname to IPv4 — GitHub Actions can't reach Supabase over IPv6
          HOSTNAME=$(echo "$RAW_URL" | python3 -c "import sys,re; m=re.search(r'@([^:/]+)', sys.stdin.read()); print(m.group(1) if m else '')" )
          IPV4=$(getent ahostsv4 "$HOSTNAME" 2>/dev/null | head -1 | awk '{print $1}')
          if [ -n "$IPV4" ]; then
            PSQL_URL="${RAW_URL/$HOSTNAME/$IPV4}"
          else
            PSQL_URL="$RAW_URL"
          fi

          for f in scripts/migrations/*.sql; do
            echo "Running $f..."
            PGSSLMODE=require psql "$PSQL_URL" -f "$f"
            echo "Done: $f"
          done
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

