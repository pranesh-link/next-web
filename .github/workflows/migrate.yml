name: Migrate DB

on:
  push:
    branches: [master]
    paths:
      - 'prisma/migrations/**'
      - 'scripts/migrations/**'

  # Allow manual trigger for re-running failed migrations
  workflow_dispatch:

concurrency:
  group: migrate-db
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile --ignore-engines

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get remove -y postgresql-client-16 || true
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run safe migration
        run: npx tsx scripts/safe-migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify migration status
        run: npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run SQL migrations (scripts/migrations/)
        run: |
          for f in scripts/migrations/*.sql; do
            echo "Running $f..."
            psql "$DIRECT_DATABASE_URL" -f "$f"
            echo "Done: $f"
          done
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
