name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - 'mobile_flutter/**'
      - '.github/workflows/flutter-*'
      - '*.md'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile --ignore-engines
      - uses: actions/cache@v4
        id: prisma
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}
      - name: Generate Prisma client
        if: steps.prisma.outputs.cache-hit != 'true'
        run: npx prisma generate
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-
      - name: Build
        run: CI="" yarn build
