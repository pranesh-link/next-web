name: Version Bump

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'mobile_flutter/**'
      - '.github/workflows/flutter-*'

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Set Git User
        run: |
          git config --global user.name "Pranesh G"
          git config --global user.email "prans1991@gmail.com"

      - name: Bump version
        run: |
          npm version minor -m "CI version bump to v%s"

      - name: Push changes
        run: |
          git push origin HEAD:master
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
