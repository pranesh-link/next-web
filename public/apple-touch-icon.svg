<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Apple touch icon with no rounded corners (Apple applies them) -->
  <rect width="180" height="180" fill="#1a1a1a"/>
  
  <!-- Letter P with modern geometric design -->
  <path d="M 56 45 L 56 135 L 67.5 135 L 67.5 95.625 L 101.25 95.625 C 118.125 95.625 129.375 84.375 129.375 70.3125 C 129.375 56.25 118.125 45 101.25 45 Z M 67.5 56.25 L 101.25 56.25 C 111.09 56.25 118.125 63.28 118.125 70.3125 C 118.125 77.34 111.09 84.375 101.25 84.375 L 67.5 84.375 Z" fill="#00ff88" stroke="#00ff88" stroke-width="1.4"/>
  
  <!-- Accent dot -->
  <circle cx="140.625" cy="50.625" r="8.4375" fill="#00ff88"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="gridApple" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="180" height="180" fill="url(#gridApple)"/>
</svg>
