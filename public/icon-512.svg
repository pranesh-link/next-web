<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="80" fill="#1a1a1a"/>
  
  <!-- Letter P with modern geometric design -->
  <path d="M 160 128 L 160 384 L 192 384 L 192 272 L 288 272 C 336 272 368 240 368 200 C 368 160 336 128 288 128 Z M 192 160 L 288 160 C 316 160 336 180 336 200 C 336 220 316 240 288 240 L 192 240 Z" fill="#00ff88" stroke="#00ff88" stroke-width="4"/>
  
  <!-- Accent dot -->
  <circle cx="400" cy="144" r="24" fill="#00ff88"/>
  
  <!-- Subtle grid pattern overlay for depth -->
  <defs>
    <pattern id="grid512" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#grid512)" rx="80"/>
  
  <!-- Subtle gradient overlay for modern look -->
  <defs>
    <radialGradient id="shine" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#shine)" rx="80"/>
</svg>
