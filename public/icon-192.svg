<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!-- Background with rounded corners -->
  <rect width="192" height="192" rx="32" fill="#1a1a1a"/>
  
  <!-- Letter P with modern geometric design -->
  <path d="M 60 48 L 60 144 L 72 144 L 72 102 L 108 102 C 126 102 138 90 138 75 C 138 60 126 48 108 48 Z M 72 60 L 108 60 C 118.5 60 126 67.5 126 75 C 126 82.5 118.5 90 108 90 L 72 90 Z" fill="#00ff88" stroke="#00ff88" stroke-width="1.5"/>
  
  <!-- Accent dot -->
  <circle cx="150" cy="54" r="9" fill="#00ff88"/>
  
  <!-- Subtle grid pattern overlay for depth -->
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="192" height="192" fill="url(#grid)" rx="32"/>
</svg>
