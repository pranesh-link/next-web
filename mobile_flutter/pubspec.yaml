name: luvverse
description: "LuvVerse — Everyday for the couple"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Offline Cache
  drift: ^2.22.1
  sqlite3: ^2.4.6
  sqlcipher_flutter_libs: ^0.6.5
  path_provider: ^2.1.5
  path: ^1.9.1

  # Connectivity
  connectivity_plus: ^6.1.4
  
  # Device Info
  shared_preferences: ^2.3.5
  package_info_plus: ^8.1.2
  battery_plus: ^7.0.0

  # Firebase
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  firebase_crashlytics: ^4.3.0

  # Local Notifications
  flutter_local_notifications: ^18.0.0

  # Auth
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.70.2

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_slidable: ^3.1.1

  # Utils
  intl: ^0.20.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  app_links: ^6.3.3

  # Web Platform
  web: ^1.1.0

  # Quick Actions (3D Touch / long-press)
  quick_actions: ^1.0.7

  # Icons
  cupertino_icons: ^1.0.8

  # Chat & Crypto
  cryptography: ^2.7.0

  # Google Drive Backup
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  share_plus: ^10.1.4

  # Media
  record: ^6.0.0
  audioplayers: ^6.1.0
  any_link_preview: ^3.0.2

  # Firebase Storage (for images/voice uploads)
  firebase_storage: ^12.4.0

  # App Badge
  app_badge_plus: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/sounds/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
