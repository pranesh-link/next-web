<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <!-- Solid professional background -->
    <linearGradient id="profileBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    
    <!-- Avatar circle gradient -->
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Letter P gradient -->
    <linearGradient id="letterP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Solid background -->
  <rect width="192" height="192" fill="url(#profileBg)"/>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="2" fill="#00ff88" opacity="0.3"/>
  <circle cx="162" cy="162" r="2" fill="#00d9ff" opacity="0.3"/>
  <circle cx="162" cy="30" r="3" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="30" cy="162" r="3" fill="#ec4899" opacity="0.2"/>
  
  <!-- Avatar circle with gradient border -->
  <circle cx="96" cy="96" r="60" fill="none" stroke="url(#avatarGrad)" stroke-width="3" opacity="0.8"/>
  <circle cx="96" cy="96" r="56" fill="#1f2937"/>
  
  <!-- Letter P for personal branding -->
  <path d="M 76 70 L 76 122 L 82 122 L 82 98 L 100 98 C 110 98 116 92 116 83 C 116 74 110 70 100 70 Z M 82 76 L 100 76 C 106 76 110 79 110 83 C 110 87 106 92 100 92 L 82 92 Z" 
        fill="url(#letterP)"/>
  
  <!-- Status indicator -->
  <circle cx="130" cy="125" r="8" fill="#10b981"/>
  <circle cx="130" cy="125" r="8" fill="#10b981" opacity="0.4">
    <animate attributeName="r" from="8" to="12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
